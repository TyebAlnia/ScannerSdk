<!DOCTYPE html>
<html>
<head>
<title>Scanner Test</title>
</head>

<body>

<form>

    <button type="button" onclick="scan()">Scan</button>

    <br><br>

    <img id="scanPreview" width="400"/>

</form>

<script>

async function scan(){

        try{

        const response = await fetch("http://localhost:1616/api/scanner/scan");

        const blob = await response.blob();

        const imageUrl = URL.createObjectURL(blob);

        document.getElementById("scanPreview").src = imageUrl;

    }
    catch(e){

        alert("Scanner Agent is not running");

    }

}

</script>

</body>
</html>
